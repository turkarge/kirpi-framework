name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, mbstring, redis, zip

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.REGISTRY }}/kirpi-app:${{ github.sha }} \
            -t ${{ secrets.REGISTRY }}/kirpi-app:latest \
            .

      - name: Push Docker Image
        run: |
          echo ${{ secrets.REGISTRY_PASSWORD }} | docker login \
            ${{ secrets.REGISTRY }} \
            -u ${{ secrets.REGISTRY_USERNAME }} \
            --password-stdin

          docker push ${{ secrets.REGISTRY }}/kirpi-app:${{ github.sha }}
          docker push ${{ secrets.REGISTRY }}/kirpi-app:latest

      - name: Deploy via Dokploy
        run: |
          curl -X POST "${{ secrets.DOKPLOY_URL }}/api/deploy" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"tag": "${{ github.sha }}"}'

      - name: Notify Success
        if: success()
        run: echo "✅ Deployment successful — ${{ github.sha }}"

      - name: Notify Failure
        if: failure()
        run: echo "❌ Deployment failed — ${{ github.sha }}"