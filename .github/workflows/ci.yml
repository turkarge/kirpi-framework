name: CI

on:
  workflow_dispatch:  # Sadece manuel tetiklenir

jobs:
  docker-test:
    name: Docker Compose Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare ENV
        run: cp .env.example .env

      - name: Build and Start Containers
        run: docker compose up -d --build

      - name: Run Tests in App Container
        run: docker compose exec -T app php vendor/bin/phpunit --testdox

      - name: Teardown Containers
        if: always()
        run: docker compose down -v

  test:
    name: PHP ${{ matrix.php }} Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.4']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: kirpi_test
          MYSQL_USER: kirpi
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_mysql, mbstring, redis, zip, gd
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy ENV
        run: cp .env.example .env.testing

      - name: Run Tests
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: kirpi_test
          DB_USERNAME: kirpi
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: vendor/bin/phpunit --testdox

  lint:
    name: Code Style
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Check Syntax
        run: find core modules manager -name "*.php" -exec php -l {} \;
