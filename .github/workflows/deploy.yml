name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, mbstring, redis, zip

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Build Docker Image
        env:
          IMAGE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: |
          docker build \
            -t ${{ secrets.REGISTRY }}/kirpi-app:${IMAGE_SHA} \
            -t ${{ secrets.REGISTRY }}/kirpi-app:latest \
            .

      - name: Push Docker Image
        env:
          IMAGE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: |
          echo ${{ secrets.REGISTRY_PASSWORD }} | docker login \
            ${{ secrets.REGISTRY }} \
            -u ${{ secrets.REGISTRY_USERNAME }} \
            --password-stdin

          docker push ${{ secrets.REGISTRY }}/kirpi-app:${IMAGE_SHA}
          docker push ${{ secrets.REGISTRY }}/kirpi-app:latest

      - name: Deploy via Dokploy
        env:
          IMAGE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: |
          curl -X POST "${{ secrets.DOKPLOY_URL }}/api/deploy" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"tag": "'"${IMAGE_SHA}"'"}'

      - name: Notify Success
        if: success()
        env:
          IMAGE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: echo "Deployment successful - ${IMAGE_SHA}"

      - name: Notify Failure
        if: failure()
        env:
          IMAGE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: echo "Deployment failed - ${IMAGE_SHA}"