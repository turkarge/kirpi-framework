services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kirpi_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      - mysql
      - redis
    networks:
      - kirpi

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kirpi_worker
    restart: unless-stopped
    command: php -r "echo 'Worker placeholder'; sleep(3600);"
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - kirpi

  manager:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kirpi_manager
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      APP_CONTEXT: manager
    depends_on:
      - mysql
      - redis
    networks:
      - kirpi

  nginx:
    image: nginx:alpine
    container_name: kirpi_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - kirpi

  mysql:
    image: mysql:8.0
    container_name: kirpi_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - kirpi

  redis:
    image: redis:alpine
    container_name: kirpi_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - kirpi

networks:
  kirpi:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
