services:
  app:
    image: ${REGISTRY}/kirpi-app:${TAG:-latest}
    restart: always
    env_file: .env.production
    depends_on:
      - mysql
      - redis
    networks:
      - kirpi

  worker:
    image: ${REGISTRY}/kirpi-app:${TAG:-latest}
    restart: always
    command: php framework queue:work --sleep=3 --tries=3
    env_file: .env.production
    depends_on:
      - mysql
      - redis
    networks:
      - kirpi

  manager:
    image: ${REGISTRY}/kirpi-app:${TAG:-latest}
    restart: always
    env_file: .env.production
    environment:
      APP_CONTEXT: manager
    networks:
      - kirpi

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - kirpi

  mysql:
    image: mysql:8.0
    restart: always
    env_file: .env.production
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - kirpi

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - kirpi

networks:
  kirpi:
    driver: bridge

volumes:
  mysql_data:
  redis_data: